# Verify PyPI — install the PUBLISHED `enchanter-golem` from real PyPI in clean,
# isolated runners and exercise it. Authored by Enchanter Labs. MIT-licensed.
#
# This is the post-publish counterpart to wheels.yml's in-build smoke test: it
# proves a *real user* on every supported platform can `pip install
# enchanter-golem` and run it with NO Go toolchain and NO C compiler. The
# `--only-binary=:all:` flag forbids pip from building the sdist, so a successful
# install across the matrix is proof the prebuilt wheel is fully self-contained
# ("same box rules" — the wheel carries the compiled Go core; nothing is built
# on the user's machine).
name: verify-pypi

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to verify (blank = latest on PyPI)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  verify:
    name: pip install ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout (for scripts/verify_install.py)
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install enchanter-golem from PyPI (wheel-only — no toolchain allowed)
        shell: bash
        run: |
          set -euo pipefail
          # Fresh, isolated venv on a pristine runner.
          python -m venv venv
          if [ -f venv/bin/python ]; then PY=venv/bin/python; else PY=venv/Scripts/python; fi
          "$PY" -m pip install --upgrade pip
          SPEC="enchanter-golem"
          if [ -n "${{ inputs.version }}" ]; then SPEC="enchanter-golem==${{ inputs.version }}"; fi
          # --only-binary=:all: => pip MUST use a prebuilt wheel; if it would need
          # to build the sdist (i.e. needs Go/C), it fails here instead.
          "$PY" -m pip install --only-binary=:all: "$SPEC"
          echo "PY=$PY" >> "$GITHUB_ENV"

      - name: Run the Pythonic verification against the installed package
        shell: bash
        run: |
          set -euo pipefail
          # The script's own directory (scripts/) goes on sys.path[0] — it has no
          # local `golem`, so this imports the PyPI-installed package, not the repo.
          "$PY" scripts/verify_install.py
