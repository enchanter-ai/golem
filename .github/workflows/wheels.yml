# Wheels — build the cffi/c-shared Python binding into prebuilt binary wheels.
# Authored by Enchanter Labs. MIT-licensed project.
#
# Pipeline: cibuildwheel builds golem's c-shared library (libgolem) from the Go core via
# cgo in its before-build hook, then packages self-contained wheels for manylinux, macOS
# (arm64), and Windows so that `pip install enchanter-golem` needs neither a Go toolchain
# nor a C compiler. A final smoke-test job installs a built wheel on a runner with NO Go
# toolchain to prove the binding is fully prebuilt.
#
# macOS: Apple-Silicon (arm64) wheels are published. Intel (x86_64) macOS prebuilt wheels
# are deferred — the GitHub macos-13 Intel runner is being retired and no longer schedules
# reliably; Intel-mac users install from the sdist, which builds the c-shared lib locally.
# Universal2 / Intel wheels are a roadmap item.
name: wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for reproducible wheel builds.
  CIBUILDWHEEL_VERSION: '4.0.0'
  GO_VERSION: '1.22.12'
  # CPython 3.11–3.13 only (the c-shared lib is ABI-independent via cffi ABI mode,
  # so one native build serves every cpXY wheel for a platform). The Python set is
  # pinned by pyproject's `build = "cp311-* cp312-* cp313-*"`; this skip only drops
  # musllinux, whose Alpine/musl toolchain our Go-into-manylinux build step does not
  # target. (cibuildwheel 4.x already excludes PyPy and Python < 3.9, so listing
  # pp*/cp38-* here is unnecessary and warns as a no-op.)
  CIBW_SKIP: '*-musllinux*'

jobs:
  build-wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # A stuck multi-OS runner must fail fast, not hang until the next push cancels it.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # manylinux x86_64
            cibw_archs: x86_64
            lib: libgolem.so
          - os: macos-14           # macOS arm64 (Apple Silicon runner)
            cibw_archs: arm64
            lib: libgolem.dylib
          - os: windows-latest     # Windows AMD64
            cibw_archs: AMD64
            lib: libgolem.dll
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.0.0
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Per wheel: build golem's c-shared library from python/capi (Go + cgo)
          # and let cibuildwheel package it next to the Python wrapper. Runs from
          # the repo root ({project}, where go.mod lives) and writes the library
          # into the package dir ({package}/golem/<lib>). The library is
          # Python-version-independent (cffi ABI mode), so one build serves every
          # cpXY wheel for the platform.
          CIBW_BEFORE_BUILD: >-
            cd {project} &&
            go build -tags golemcapi -buildmode=c-shared
            -o {package}/golem/${{ matrix.lib }} ./python/capi
          # cgo requires a C compiler for -buildmode=c-shared (gcc on manylinux,
          # clang on macOS, the runner's gcc/MinGW on Windows).
          CIBW_ENVIRONMENT: 'CGO_ENABLED=1'
          # manylinux image has no Go; install the pinned Go into the container.
          CIBW_BEFORE_ALL_LINUX: >-
            curl -sSL https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz
            | tar -C /usr/local -xz
          CIBW_ENVIRONMENT_LINUX: 'CGO_ENABLED=1 PATH=$PATH:/usr/local/go/bin'

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  smoke-test:
    name: wheel smoke-test (no Go toolchain)
    needs: build-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download Linux x86_64 wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist

      - name: Remove the runner's Go toolchain (simulate a Go-free machine)
        shell: bash
        run: |
          # ubuntu-latest preinstalls Go; physically remove it so the install
          # below genuinely proves the wheel needs no Go toolchain — not merely
          # that one happens to be off PATH.
          sudo rm -rf /usr/local/go /opt/hostedtoolcache/go || true
          hash -r
          if command -v go >/dev/null 2>&1; then
            echo "::error::a Go toolchain is still present after removal; the no-Go proof is invalid"
            exit 1
          fi
          echo "confirmed: no Go toolchain on PATH"

      - name: Install the prebuilt wheel (golem from the local wheel only)
        shell: bash
        run: |
          # cffi is a normal PyPI runtime dependency (pure-Python install, no
          # C/Go toolchain). golem itself must come ONLY from the local wheel,
          # so it is installed with --no-index to prove self-containment.
          pip install cffi
          pip install --no-index --find-links dist enchanter-golem

      - name: Run smoke test + parity tests
        shell: bash
        run: |
          pip install pytest
          python -c "import golem; print(golem.Engine(variables={'x': 0.0}).eval('2 + 3 * (x - 1)', {'x': 5}))"
          pytest python/tests -v
