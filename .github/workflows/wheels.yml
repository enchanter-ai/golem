# Wheels — build the gopy-generated Python binding into prebuilt binary wheels.
# Authored by Enchanter Labs. MIT-licensed project.
#
# Pipeline: gopy emits the CPython extension from the Go core, then cibuildwheel packages
# self-contained wheels for manylinux, macOS (x86_64 + arm64), and Windows so that
# `pip install enchanter-golem` needs neither a Go toolchain nor a C compiler. A final smoke-test job
# installs a built wheel on a runner with NO Go toolchain to prove the binding is fully
# prebuilt. There is no maturin-for-Go, so gopy is invoked from cibuildwheel's before-build hook.
name: wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for reproducible wheel builds. cibuildwheel + gopy + goimports are version-locked.
  CIBUILDWHEEL_VERSION: '2.21.3'
  GO_VERSION: '1.22'
  GOPY_VERSION: 'v0.4.10'
  GOIMPORTS_VERSION: 'v0.25.0'
  PYBINDGEN_VERSION: '0.22.1'
  # gopy needs a CPython for every wheel ABI; cibuildwheel supplies it per-build.
  # Restrict to CPython 3.11–3.13 (gopy's supported range); gopy does not target
  # PyPy. Skipping cp38/cp39/cp310 keeps this in lockstep with pyproject's
  # build = "cp311-* cp312-* cp313-*" and requires-python = ">=3.11".
  CIBW_SKIP: 'pp* *-musllinux* cp38-* cp39-* cp310-*'

jobs:
  build-wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # manylinux x86_64
            cibw_archs: x86_64
          - os: macos-13           # macOS x86_64 (Intel runner)
            cibw_archs: x86_64
          - os: macos-14           # macOS arm64 (Apple Silicon runner)
            cibw_archs: arm64
          - os: windows-latest     # Windows AMD64
            cibw_archs: AMD64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Install gopy toolchain
        shell: bash
        run: |
          go install github.com/go-python/gopy@${{ env.GOPY_VERSION }}
          go install golang.org/x/tools/cmd/goimports@${{ env.GOIMPORTS_VERSION }}
          # Expose the freshly-installed Go binaries to cibuildwheel's build hook.
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # gopy + pybindgen must exist in the per-wheel build environment.
          CIBW_BEFORE_BUILD: 'pip install pybindgen==${{ env.PYBINDGEN_VERSION }}'
          # macOS arm64 cross/native target hint for the Go build.
          CIBW_ENVIRONMENT_MACOS: >-
            GOPY_TARGET_ARCH=${{ matrix.cibw_archs }}
          # manylinux image ships Go via the before-build hook below (no Go preinstalled).
          CIBW_BEFORE_ALL_LINUX: >-
            curl -sSL https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz
            | tar -C /usr/local -xz &&
            /usr/local/go/bin/go install github.com/go-python/gopy@${{ env.GOPY_VERSION }} &&
            /usr/local/go/bin/go install golang.org/x/tools/cmd/goimports@${{ env.GOIMPORTS_VERSION }}
          CIBW_ENVIRONMENT_LINUX: 'PATH=$PATH:/usr/local/go/bin:/root/go/bin'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  smoke-test:
    name: wheel smoke-test (no Go toolchain)
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download Linux x86_64 wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist

      - name: Assert no Go toolchain is present
        shell: bash
        run: |
          if command -v go >/dev/null 2>&1; then
            echo "::error::a Go toolchain is unexpectedly present; smoke-test must run without one"
            exit 1
          fi
          echo "confirmed: no Go toolchain on PATH"

      - name: Install the prebuilt wheel
        shell: bash
        run: pip install --no-index --find-links dist golem

      - name: Run smoke test + parity tests
        shell: bash
        run: |
          pip install pytest
          python -c "import golem; print(golem.Engine(variables={'x': 0.0}).eval('2 + 3 * (x - 1)', {'x': 5}))"
          pytest python/tests -v
