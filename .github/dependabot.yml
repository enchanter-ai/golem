# Dependabot — automated dependency updates for golem.
# Authored by Enchanter Labs. MIT-licensed project.
#
# Three ecosystems: Go modules (the core), GitHub Actions (CI/wheels workflows), and pip
# (the Python binding under python/). Weekly cadence; grouped minor/patch bumps to keep PR
# volume sane while still surfacing majors individually.
version: 2

updates:
  # Go core dependencies (expr-lang/expr, hashicorp/golang-lru/v2, ...).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by ci.yml and wheels.yml.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(actions)"
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Python binding dependencies (pyproject.toml under python/).
  - package-ecosystem: pip
    directory: "/python"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(pip)"
    labels:
      - dependencies
      - python
    groups:
      pip-minor-patch:
        update-types:
          - minor
          - patch
