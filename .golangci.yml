# golangci-lint configuration for golem (v2 schema).
#
# Pinned to the golangci-lint version in .github/workflows/ci.yml
# (GOLANGCI_LINT_VERSION). The linters golem relies on are listed explicitly so
# a version bump cannot silently add or drop one. staticcheck also runs as a
# standalone CI job — intentional; the two surfaces use different versions.
# Migrated from the v1 schema with `golangci-lint migrate`; verified `0 issues`.
version: "2"
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
