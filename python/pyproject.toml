# golem — Python binding packaging.
# Author: Enchanter Labs. License: MIT.
#
# This builds the `golem` wheel: the hand-written Pythonic wrapper
# (golem/__init__.py, golem/_ffi.py) plus the gopy-generated CPython extension
# (golem/_golem/*), which is produced at build time by `gopy build` (see the
# invocation documented in golem/_ffi.py and run by .github/workflows/wheels.yml).
# The gopy-generated files are NOT committed; cibuildwheel regenerates them in
# each wheel job so `pip install enchanter-golem` needs no Go/C toolchain.

[build-system]
# setuptools is the build backend. The actual extension is compiled by `gopy
# build` invoked from cibuildwheel's before-build step; setuptools then packages
# the resulting golem/_golem artifacts into the wheel.
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enchanter-golem"
description = "Fast, safe, loud expression evaluation — a Pythonic skin over the Go expr-lang core."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Enchanter Labs" }]
keywords = ["expression", "evaluator", "expr-lang", "rules", "dsl", "sandbox"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Go",
    "Topic :: Software Development :: Interpreters",
    "Intended Audience :: Developers",
]
# SINGLE SOURCE OF TRUTH for the version: read from golem.__version__, which is
# "0.1.0" and matches the Go release tag v0.1.0. There is never a second
# hardcoded version string. (The Go tag and this attr are kept in lockstep by
# the release checklist in CONTRIBUTING.)
dynamic = ["version"]

[project.urls]
Homepage = "https://github.com/enchanter-ai/golem"
Repository = "https://github.com/enchanter-ai/golem"
Issues = "https://github.com/enchanter-ai/golem/issues"

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools]
# The importable package is `golem`, rooted at this directory (python/golem).
packages = ["golem", "golem._golem"]

[tool.setuptools.dynamic]
version = { attr = "golem.__version__" }

[tool.setuptools.package-data]
# Ship the compiled extension and any gopy-generated Python shims with the wheel.
"golem._golem" = ["*.so", "*.pyd", "*.dll", "*.dylib", "*.py"]

# ---------------------------------------------------------------------------
# cibuildwheel — prebuilt binary wheels for every target so `pip install enchanter-golem`
# needs no Go toolchain or C compiler. Tool versions are PINNED in wheels.yml
# (gopy + cibuildwheel) for reproducibility; this section configures the matrix
# and the per-wheel gopy generation + smoke test.
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
# CPython only (gopy targets CPython, ~3.11–3.13); skip PyPy and 32-bit musl
# where the Go toolchain story is unsupported.
build = "cp311-* cp312-* cp313-*"
skip = ["pp*", "*-musllinux_i686", "*_i686", "*-win32"]
build-frontend = "build"

# NOTE: the gopy generation + Go/PATH wiring lives in .github/workflows/wheels.yml
# (CIBW_BEFORE_BUILD / CIBW_BEFORE_ALL_LINUX / CIBW_ENVIRONMENT_*), which is the
# single source of truth for the build environment. Keeping it there avoids the
# pyproject-vs-env override ambiguity.

# Smoke test inside the wheel build: import the binding and evaluate the spec
# example. This is the lightweight in-job check; the full Go/Python parity
# corpus runs in test-command below.
test-requires = "pytest"
test-command = "pytest {project}/python/tests -q"

# Per-OS build environment (Go install on manylinux, PATH wiring, archs) is set
# in .github/workflows/wheels.yml via CIBW_* env vars and the job matrix.
